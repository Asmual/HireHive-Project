<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#121214" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>

    <linearGradient id="hiveGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="250" cy="250" r="230" fill="url(#bgGradient)" stroke="#27272a" stroke-width="6" />

  <circle cx="250" cy="250" r="180" fill="none" stroke="#10b981" stroke-width="2" opacity="0.1" filter="url(#glow)" />

  <polygon points="250,110 370,180 370,320 250,390 130,320 130,180" 
           fill="none" 
           stroke="url(#hiveGradient)" 
           stroke-width="14" 
           stroke-linejoin="round"
           filter="url(#glow)" />

  <path d="M 200 190 L 200 310" stroke="#f4f4f5" stroke-width="18" stroke-linecap="round" />
  <path d="M 300 190 L 300 310" stroke="#f4f4f5" stroke-width="18" stroke-linecap="round" />
  <path d="M 200 250 L 230 250" stroke="#f4f4f5" stroke-width="18" />
  <path d="M 270 250 L 300 250" stroke="#f4f4f5" stroke-width="18" />
  <circle cx="250" cy="250" r="14" fill="#10b981" filter="url(#glow)" />
</svg>
